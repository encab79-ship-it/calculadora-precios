<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" fill="url(#grad)" rx="64"/>

  <!-- Calculadora -->
  <g transform="translate(256, 256)">
    <!-- Pantalla -->
    <rect x="-120" y="-140" width="240" height="60" fill="#fff" rx="8" opacity="0.9"/>

    <!-- Símbolo de dinero -->
    <text x="0" y="-90" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">$</text>

    <!-- Botones -->
    <circle cx="-60" cy="60" r="25" fill="#fff" opacity="0.3"/>
    <circle cx="0" cy="60" r="25" fill="#fff" opacity="0.3"/>
    <circle cx="60" cy="60" r="25" fill="#fff" opacity="0.3"/>
    <circle cx="-60" cy="120" r="25" fill="#fff" opacity="0.3"/>
    <circle cx="0" cy="120" r="25" fill="#fff" opacity="0.3"/>
    <circle cx="60" cy="120" r="25" fill="#fff" opacity="0.3"/>
  </g>
</svg>
