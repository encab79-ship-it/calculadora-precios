<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <title>Productos - Calculadora de Precios</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Gestión de Productos</h1>
            <nav>
                <a href="index.html">Calculadora</a>
                <a href="productos.html" class="active">Productos</a>
                <a href="clientes.html">Clientes</a>
            </nav>
        </header>

        <main>
            <div class="card">
                <h2>Agregar Nuevo Producto</h2>

                <div class="form-group">
                    <label for="color">Color de Esponja:</label>
                    <input type="text" id="color" class="input" placeholder="Ejemplo: Azul, Rojo, Verde...">
                </div>

                <div class="form-group">
                    <label for="densidad">Densidad:</label>
                    <input type="text" id="densidad" class="input" placeholder="Ejemplo: Alta, Media, Baja, 30kg/m³...">
                </div>

                <div class="form-group">
                    <label for="costoPorCm">Costo por Centímetro ($):</label>
                    <input type="number" id="costoPorCm" class="input" placeholder="Ejemplo: 2.50" min="0" step="0.01">
                </div>

                <button onclick="agregarProducto()" class="btn btn-primary">Agregar Producto</button>
                <div id="mensaje"></div>
            </div>

            <div class="card">
                <h2>Productos Registrados</h2>
                <div id="listaProductos"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        window.addEventListener('load', mostrarProductos);

        function agregarProducto() {
            const color = document.getElementById('color').value.trim();
            const densidad = document.getElementById('densidad').value.trim();
            const costoPorCm = document.getElementById('costoPorCm').value;
            const mensajeDiv = document.getElementById('mensaje');

            // Validaciones
            if (!color) {
                mensajeDiv.innerHTML = '<div class="error">⚠️ Ingresa el color</div>';
                return;
            }
            if (!densidad) {
                mensajeDiv.innerHTML = '<div class="error">⚠️ Ingresa la densidad</div>';
                return;
            }
            if (!costoPorCm || parseFloat(costoPorCm) <= 0) {
                mensajeDiv.innerHTML = '<div class="error">⚠️ Ingresa un costo válido</div>';
                return;
            }

            // Guardar producto
            const productos = obtenerProductos();
            productos.push({
                color: color,
                densidad: densidad,
                costoPorCm: costoPorCm
            });
            guardarProductos(productos);

            // Limpiar formulario
            document.getElementById('color').value = '';
            document.getElementById('densidad').value = '';
            document.getElementById('costoPorCm').value = '';

            mensajeDiv.innerHTML = '<div class="success">✅ Producto agregado exitosamente</div>';
            setTimeout(() => mensajeDiv.innerHTML = '', 3000);

            mostrarProductos();
        }

        function mostrarProductos() {
            const productos = obtenerProductos();
            const lista = document.getElementById('listaProductos');

            if (productos.length === 0) {
                lista.innerHTML = '<p class="empty">No hay productos registrados. Agrega el primero arriba.</p>';
                return;
            }

            let html = '<div class="tabla">';
            productos.forEach((prod, index) => {
                html += `
                    <div class="tabla-item">
                        <div class="tabla-info">
                            <strong>${prod.color} - ${prod.densidad}</strong><br>
                            <span class="precio">$${parseFloat(prod.costoPorCm).toFixed(2)}/cm</span>
                        </div>
                        <button onclick="eliminarProducto(${index})" class="btn btn-danger btn-small">Eliminar</button>
                    </div>
                `;
            });
            html += '</div>';
            lista.innerHTML = html;
        }

        function eliminarProducto(index) {
            if (confirm('¿Estás seguro de eliminar este producto?')) {
                const productos = obtenerProductos();
                productos.splice(index, 1);
                guardarProductos(productos);
                mostrarProductos();
            }
        }
    </script>
</body>
</html>
